<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖 رسالة سرية 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #1a0026, #ff4d6d);
  overflow: auto; /* ✅ تقدر تعمل Scroll */
}

h1 {
  margin-top: 50px;
  font-size: 38px;
  text-shadow: 0 0 20px pink;
}

/* 🔥 عداد */
#countdown {
  margin-top: 20px;
  font-size: 22px;
  background: rgba(255,255,255,0.1);
  display: inline-block;
  padding: 15px 25px;
  border-radius: 20px;
  box-shadow: 0 0 15px pink;
}

input {
  padding: 12px;
  border-radius: 20px;
  border: none;
  margin-top: 20px;
  text-align: center;
  font-size: 18px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, red, pink);
  color: white;
  margin-top: 15px;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 15px pink;
}

/* 💖 الرسالة */
#secret {
  display: none;
  margin: 30px auto;
  width: 85%;
  max-width: 500px;
  background: rgba(0,0,0,0.5);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 25px pink;
  font-size: 24px;
  white-space: pre-line;
}

/* 🖼️ الصورة */
img {
  width: 100%;
  margin-top: 20px;
  border-radius: 20px;
  box-shadow: 0 0 20px pink;
  animation: float 3s infinite alternate;
}

@keyframes float {
  from {transform: translateY(0);}
  to {transform: translateY(-10px);}
}

/* 💖 قلوب */
.heart {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: hearts 5s linear infinite;
}

@keyframes hearts {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>💌 رسالة سرية 💌</h1>

<div id="countdown"></div>

<p>اكتب الباسورد أو استنى المفاجأة ❤️</p>

<input type="password" id="pass" placeholder="الباسورد">
<br>
<button onclick="openMessage()">افتح 💖</button>

<div id="secret">
  <p id="text"></p>

  <!-- ✅ الصورة شغالة -->
  <img src="https://i.ibb.co/bRysMc1P/images.jpg" onerror="this.style.display='none'">
</div>

<script>

// ⏰ وقت الجمعة
let targetDate = new Date("2026-03-20T00:00:00");

// 🔥 عداد
function updateCountdown() {
  let now = new Date();
  let diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "🎉 المفاجأة وصلت 💖";
    showMessage();
    return;
  }

  let days = Math.floor(diff / (1000 * 60 * 60 * 24));
  let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  let minutes = Math.floor((diff / (1000 * 60)) % 60);
  let seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    `⏳ باقي:<br>
     💖 ${days} يوم <br>
     ⏰ ${hours} ساعة <br>
     ⌛ ${minutes} دقيقة <br>
     🔥 ${seconds} ثانية`;
}

setInterval(updateCountdown, 1000);

// ✍️ كتابة الرسالة
let message = "💖 كل سنة وانت معايا كل عيد وانتي عيدي وبحبكوبحبك جدًا ❤️";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 70);
  }
}

// 🔐 باسورد
function openMessage() {
  let p = document.getElementById("pass").value;

  if(p === "542008") {
    showMessage();
  } else {
    alert("❌ باسورد غلط");
  }
}

// 🎯 عرض الرسالة
function showMessage() {
  document.getElementById("secret").style.display = "block";
  if(i === 0) typeWriter();
}

// 💖 قلوب
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 400);

</script>

</body>
</html>
