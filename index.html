<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖 رسالة سرية 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #1a0026, #ff4d6d);
  overflow: auto;
}

h1 {
  margin-top: 50px;
  font-size: 38px;
  text-shadow: 0 0 20px pink;
}

#countdown {
  margin-top: 20px;
  font-size: 22px;
  background: rgba(255,255,255,0.1);
  display: inline-block;
  padding: 15px 25px;
  border-radius: 20px;
  box-shadow: 0 0 15px pink;
}

input {
  padding: 12px;
  border-radius: 20px;
  border: none;
  margin-top: 20px;
  text-align: center;
  font-size: 18px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, red, pink);
  color: white;
  margin-top: 15px;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 15px pink;
}

#secret {
  display: none;
  margin: 30px auto;
  width: 85%;
  max-width: 500px;
  background: rgba(0,0,0,0.5);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 25px pink;
  font-size: 24px;
  white-space: pre-line;
}

img {
  width: 100%;
  margin-top: 20px;
  border-radius: 20px;
  box-shadow: 0 0 20px pink;
  animation: float 3s infinite alternate;
}

@keyframes float {
  from {transform: translateY(0);}
  to {transform: translateY(-10px);}
}

.heart {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: hearts 5s linear infinite;
}

@keyframes hearts {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

#fireworks {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
</style>
</head>

<body>

<h1>💌 😂 رساله سريه تاني يا مسهل 😂 💌</h1>

<div id="countdown"></div>

<p>بعد ما بوظتي المفاجأة 😂❤️</p>

<input type="password" id="pass" placeholder="الباسورد">
<br>
<button onclick="openMessage()">افتح 💖</button>

<div id="secret">
  <p id="text"></p>
  <img src="https://i.ibb.co/bRysMc1P/images.jpg">
</div>

<!-- 🔊 الصوت -->
<audio id="music" src="https://files.catbox.moe/1ww495.m4a"></audio>

<canvas id="fireworks"></canvas>

<script>

let targetDate = new Date("2026-03-20T00:00:00");

function updateCountdown() {
  let now = new Date();
  let diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "🎉 المفاجأة وصلت 💖";
    showMessage();
    return;
  }

  let days = Math.floor(diff / (1000 * 60 * 60 * 24));
  let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  let minutes = Math.floor((diff / (1000 * 60)) % 60);
  let seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    `⏳ باقي:<br>${days} يوم - ${hours} ساعة - ${minutes} دقيقة - ${seconds} ثانية`;
}
setInterval(updateCountdown, 1000);

let message = "💖 كل عيد وانتي عيدي ❤️";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 70);
  }
}

function openMessage() {
  let p = document.getElementById("pass").value;

  if(p === "22288") {
    showMessage();
  } else {
    alert("❌ غلط 😂");
  }
}

function showMessage() {
  document.getElementById("secret").style.display = "block";

  if(i === 0) typeWriter();

  // 🔊 تشغيل الصوت
  let music = document.getElementById("music");
  music.play();

  // 🎆 ألعاب نارية مستمرة
  if (!window.fireworksStarted) {
    window.fireworksStarted = true;

    setInterval(() => {
      createFirework(
        Math.random() * canvas.width,
        Math.random() * canvas.height / 2
      );
    }, 400);
  }
}

// 💖 قلوب
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 400);

// 🎆 الألعاب النارية
let canvas = document.getElementById("fireworks");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y) {
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: x,
      y: y,
      speedX: (Math.random() - 0.5) * 6,
      speedY: (Math.random() - 0.5) * 6,
      life: 100
    });
  }
}

function animateFireworks() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, index) => {
    p.x += p.speedX;
    p.y += p.speedY;
    p.life--;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = "pink";
    ctx.fill();

    if (p.life <= 0) {
      particles.splice(index, 1);
    }
  });

  requestAnimationFrame(animateFireworks);
}

animateFireworks();

</script>

</body>
</html>
