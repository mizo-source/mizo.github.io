<!DOCTYPE html>
<html>
<head>
  <title>Secret Love 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      overflow: hidden;
    }

    /* خلفية */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ff4d6d, #1a0026);
      z-index: -1;
    }

    h1 {
      margin-top: 100px;
      font-size: 40px;
      text-shadow: 0 0 15px pink;
    }

    input {
      padding: 12px;
      border-radius: 20px;
      border: none;
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(45deg, red, pink);
      color: white;
      margin-top: 15px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 0 15px pink;
    }

    #secret {
      display: none;
      margin-top: 40px;
      font-size: 28px;
      animation: fade 2s;
    }

    img {
      width: 250px;
      margin-top: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px pink;
      animation: float 3s infinite alternate;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes float {
      from {transform: translateY(0);}
      to {transform: translateY(-10px);}
    }

    /* قلوب */
    .heart {
      position: fixed;
      color: pink;
      font-size: 20px;
      animation: hearts 5s linear infinite;
    }

    @keyframes hearts {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>💌 رسالة سرية 💌</h1>

<p>اكتب الباسورد أو استنى المفاجأة ❤️</p>

<input type="password" id="pass" placeholder="الباسورد">
<br>
<button onclick="checkPass()">افتح 💖</button>

<div id="secret">
  <p>💖 كل سنة وانت معايا وبحبك جدًا 💖</p>

  <!-- الصورة -->
  <img src="https://i.ibb.co/0jqHpnp/love.png">
</div>

<script>
// 🔐 باسورد
function checkPass() {
  let p = document.getElementById("pass").value;

  if(p === "542008") {
    document.getElementById("secret").style.display = "block";
  } else {
    alert("❌ باسورد غلط");
  }
}

// ⏰ الجمعة الساعة 12
let targetDate = new Date("2026-03-20T00:00:00");

setInterval(() => {
  let now = new Date();
  if(now >= targetDate) {
    document.getElementById("secret").style.display = "block";
  }
}, 1000);

// 💖 قلوب
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 400);
</script>

</body>
</html>
