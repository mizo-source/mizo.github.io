<!DOCTYPE html>
<html>
<head>
  <title>Secret Love 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: white;
    }

    h1 {
      margin-top: 100px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 20px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: red;
      color: white;
      margin-top: 10px;
      cursor: pointer;
    }

    #secret {
      display: none;
      margin-top: 30px;
      font-size: 22px;
      animation: fade 1s ease;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

<h1>💌 رسالة سرية 💌</h1>

<p>اكتب الباسورد عشان تشوف الرسالة ❤️</p>

<input type="password" id="pass" placeholder="542008">
<br>
<button onclick="checkPass()">افتح 💖</button>

<p id="secret">💖 أنا بحبك جدًا جدًا 💖</p>

<script>
function checkPass() {
  let p = document.getElementById("pass").value;

  if(p === "1234") {
    document.getElementById("secret").style.display = "block";
  } else {
    alert("❌ باسورد غلط");
  }
}
</script>

</body>
</html>
