<!DOCTYPE html>
<html>
<head>
  <title>Secret Love 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- خط جميل -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #1a0026, #4b006e, #ff4d6d);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 80px;
      font-size: 42px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px pink; }
      to { text-shadow: 0 0 25px red; }
    }

    p {
      font-size: 20px;
    }

    input {
      padding: 12px;
      border-radius: 20px;
      border: none;
      text-align: center;
      font-size: 16px;
      margin-top: 20px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #ff1e56;
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: #ff4d6d;
    }

    #secret {
      display: none;
      margin-top: 30px;
      font-size: 24px;
      animation: fade 1.5s ease;
    }

    img {
      width: 200px;
      margin-top: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    /* قلوب متحركة */
    .heart {
      position: absolute;
      color: pink;
      font-size: 20px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>💖 رسالة سرية 💖</h1>
<p>اكتب الباسورد عشان تشوف المفاجأة ❤️</p>

<input type="password" id="pass" placeholder="542008">
<br>
<button onclick="checkPass()">فتح 💌</button>

<div id="secret">
  <p>💖 أنا بحبك جدًا ومش قادر أعيش من غيرك 💖</p>

  <!-- صورة رومانسية -->
  <img src="https://i.imgur.com/8Km9tLL.png">
</div>

<script>
function checkPass() {
  let p = document.getElementById("pass").value;

  if(p === "1234") {
    document.getElementById("secret").style.display = "block";
  } else {
    alert("❌ باسورد غلط");
  }
}

/* قلوب */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 20 + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
